<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hợp Đồng Thuê Căn Hộ – Vinhomes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<style>
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f9f8f6;
  --border: #e5e1d8;
  --text: #1a1816;
  --text2: #6b6560;
  --text3: #9e9890;
  --accent: #c8a96e;
  --accent-dark: #a8893e;
  --danger: #c0392b;
  --success: #27704a;
  --info: #2563a8;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
h1{font-family:'Playfair Display',serif;font-weight:500}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:var(--shadow)}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo h1{font-size:22px;color:var(--text)}
.login-logo p{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:.05em;text-transform:uppercase}
.login-box label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.login-box input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface2);outline:none;transition:.15s}
.login-box input:focus{border-color:var(--accent);background:#fff}
.login-box .field{margin-bottom:1rem}
.btn-login{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;margin-top:.5rem;transition:.15s}
.btn-login:hover{background:#333}
.login-err{color:var(--danger);font-size:12px;text-align:center;margin-top:.75rem;min-height:18px}

/* LAYOUT */
#app{display:none;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}

.nav{display:flex;gap:2px;padding:0 1rem;background:var(--surface);border-bottom:1px solid var(--border)}
.nav-btn{padding:10px 14px;font-size:13px;font-family:inherit;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:.15s}
.nav-btn.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500}

.content{padding:1.25rem;max-width:900px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}

.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;transition:.15s;width:100%}
.field input:focus,.field select:focus{border-color:var(--accent);background:#fff}
.field input[readonly]{opacity:.55;cursor:default}
.field textarea{resize:vertical;min-height:56px}
.full{grid-column:1/-1}
.section-sep{grid-column:1/-1;border:none;border-top:1px solid var(--border);margin:.25rem 0}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333}
.btn-gold{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-gold:hover{background:var(--accent-dark)}
.btn-danger{color:var(--danger);border-color:transparent}
.btn-danger:hover{background:#fdf2f2}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}

/* FURNITURE */
.fur-row{display:grid;grid-template-columns:1fr 60px 110px 30px;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
.fur-row:last-child{border-bottom:none}
.fur-row input,.fur-row select{padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;background:var(--surface2);outline:none}
.fur-row input:focus,.fur-row select:focus{border-color:var(--accent)}

/* LIST */
.contract-item{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border);transition:.1s}
.contract-item:last-child{border-bottom:none}
.contract-item:hover{background:var(--surface2)}
.ci-info{flex:1;min-width:0}
.ci-main{font-weight:500;font-size:14px}
.ci-sub{font-size:12px;color:var(--text2);margin-top:2px}
.ci-meta{font-size:11px;color:var(--text3);margin-top:1px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.badge-active{background:#d1fae5;color:#065f46}
.badge-draft{background:#e0f2fe;color:#075985}
.tag-role{background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.stat-num{font-size:24px;font-weight:600;color:var(--text)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:999;transform:translateY(20px);opacity:0;transition:.25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* LOADING */
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-size:14px;color:var(--text2)}
.loading-overlay.show{display:flex}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty svg{width:48px;height:48px;margin-bottom:1rem;opacity:.3}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:1rem}
.search-bar input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--surface);outline:none}
.search-bar input:focus{border-color:var(--accent)}

/* MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-backdrop.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:1.5rem;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}

/* PRINT HIDE */
@media print{.topbar,.nav,.btn,#tab-new,#tab-admin{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Hợp Đồng</h1>
      <p>Quản lý thuê căn hộ · Vinhomes</p>
    </div>
    <div class="field"><label>Tên đăng nhập</label><input id="inp-user" placeholder="username" autocomplete="username"></div>
    <div class="field"><label>Mã PIN</label><input id="inp-pin" type="password" placeholder="••••" autocomplete="current-password"></div>
    <button class="btn-login" onclick="doLogin()">Đăng nhập</button>
    <div class="login-err" id="login-err"></div>
    <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:1rem">Mặc định: admin / 1234</p>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="spinner" style="width:28px;height:28px;border-width:3px"></div>
  <span id="loading-msg">Đang xử lý...</span>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Hợp Đồng</h1>
    </div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="avatar" id="user-avatar">?</div>
        <span id="user-name">...</span>
        <span class="tag-role" id="user-role-tag" style="display:none">Admin</span>
      </div>
      <button class="btn btn-sm" onclick="doLogout()">Đăng xuất</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('list', this)">📋 Danh sách</button>
    <button class="nav-btn" onclick="showTab('new', this)">➕ Tạo hợp đồng</button>
    <button class="nav-btn" id="admin-tab" onclick="showTab('admin', this)" style="display:none">⚙️ Quản trị</button>
  </div>

  <div class="content">

    <!-- LIST TAB -->
    <div class="page active" id="tab-list">
      <div class="stats-grid" id="stats-area"></div>
      <div class="card" style="padding:0">
        <div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <span style="font-weight:500;font-size:13px">Danh sách hợp đồng</span>
          <div class="search-bar" style="margin:0;width:200px">
            <input id="search-inp" placeholder="Tìm kiếm..." oninput="renderList()">
          </div>
        </div>
        <div id="list-area"></div>
      </div>
    </div>

    <!-- NEW CONTRACT TAB -->
    <div class="page" id="tab-new">
      <div class="card">
        <div class="card-title">Thông tin căn hộ</div>
        <div class="grid2">
          <div class="field"><label>Số hợp đồng</label><input id="f-hdso" placeholder="GH617.05/VHGP/HĐTN/2026"></div>
          <div class="field"><label>Số căn hộ</label><input id="f-canho" placeholder="17.05"></div>
          <div class="field"><label>Tầng</label><input id="f-tang" placeholder="17"></div>
          <div class="field"><label>Tòa</label><input id="f-toa" placeholder="GH6"></div>
          <div class="field"><label>Diện tích (m²)</label><input id="f-dt" type="number" placeholder="85"></div>
          <div class="field"><label>Khu đô thị</label><input id="f-kdt" value="Vinhomes Grand Park, Long Bình, Hồ Chí Minh"></div>
          <div class="field"><label>Ngày ký</label><input id="f-ngayky" type="date"></div>
          <div class="field"><label>Mã hóa đơn điện PE</label><input id="f-madien" placeholder="Mã PE..."></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Bên A – Chủ cho thuê</div>
        <div class="grid2">
          <div class="field"><label>Họ tên</label><input id="A-ten"></div>
          <div class="field"><label>CCCD số</label><input id="A-cccd"></div>
          <div class="field"><label>Cấp ngày</label><input id="A-capngay" type="date"></div>
          <div class="field"><label>Nơi cấp</label><input id="A-noicap" placeholder="Cục CS QLHC..."></div>
          <div class="field full"><label>Hộ khẩu thường trú</label><input id="A-hokhau"></div>
          <div class="field"><label>Số điện thoại</label><input id="A-sdt"></div>
          <div class="field"><label>Số tài khoản</label><input id="A-stk"></div>
          <div class="field"><label>Ngân hàng</label><input id="A-ngan"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Bên B – Người thuê</div>
        <div class="grid2">
          <div class="field"><label>Họ tên</label><input id="B-ten"></div>
          <div class="field"><label>CCCD số</label><input id="B-cccd"></div>
          <div class="field"><label>Cấp ngày</label><input id="B-capngay" type="date"></div>
          <div class="field"><label>Nơi cấp</label><input id="B-noicap" placeholder="Cục CS QLHC..."></div>
          <div class="field full"><label>Hộ khẩu thường trú</label><input id="B-hokhau"></div>
          <div class="field"><label>Số điện thoại</label><input id="B-sdt"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Bên C – Môi giới</div>
        <div class="grid2">
          <div class="field"><label>Họ tên</label><input id="C-ten"></div>
          <div class="field"><label>CCCD số</label><input id="C-cccd"></div>
          <div class="field"><label>Cấp ngày</label><input id="C-capngay" type="date"></div>
          <div class="field"><label>Số điện thoại</label><input id="C-sdt"></div>
          <div class="field"><label>Số tài khoản</label><input id="C-stk"></div>
          <div class="field"><label>Ngân hàng</label><input id="C-ngan"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Thời hạn & Tài chính</div>
        <div class="grid2">
          <div class="field"><label>Số tháng thuê</label><input id="f-sothang" type="number" value="12" oninput="tinhToan()"></div>
          <div class="field"><label>Ngày bắt đầu</label><input id="f-batdau" type="date" oninput="tinhToan()"></div>
          <div class="field"><label>Ngày kết thúc</label><input id="f-ketthuc" readonly></div>
          <div class="field"><label>Giá thuê / tháng (VNĐ)</label><input id="f-giathue" type="number" placeholder="18000000" oninput="tinhToan()"></div>
          <hr class="section-sep">
          <div class="field"><label>Tiền cọc (= 2 tháng, tự tính)</label><input id="f-coc" readonly></div>
          <div class="field"><label>Thù lao môi giới (= 1 tháng)</label><input id="f-thulaomg" readonly></div>
          <div class="field"><label>Ngày đặt cọc lần 1 (giữ chỗ)</label><input id="f-coc1ngay" type="date"></div>
          <div class="field"><label>Số tiền cọc lần 1 (VNĐ)</label><input id="f-coc1so" type="number" placeholder="5000000"></div>
          <div class="field"><label>Ngày đặt cọc lần 2</label><input id="f-coc2ngay" type="date"></div>
          <hr class="section-sep">
          <div class="field"><label>Thanh toán từ ngày</label><input id="f-ttngay1" type="number" value="15" min="1" max="28"></div>
          <div class="field"><label>Đến ngày</label><input id="f-ttngay2" type="number" value="20" min="1" max="28"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="justify-content:space-between">
          <span>Nội thất bàn giao</span>
          <button class="btn btn-sm" onclick="addFurniture()">+ Thêm</button>
        </div>
        <div id="fur-list"></div>
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;padding-bottom:2rem">
        <button class="btn btn-gold" onclick="saveAndDownload()">💾 Lưu & tải .docx</button>
        <button class="btn btn-primary" onclick="saveDraft()">📌 Lưu nháp</button>
        <button class="btn" onclick="clearForm()">🔄 Làm mới</button>
      </div>
    </div>

    <!-- ADMIN TAB -->
    <div class="page" id="tab-admin">
      <div class="card">
        <div class="card-title" style="justify-content:space-between">
          <span>Quản lý người dùng</span>
          <button class="btn btn-sm btn-primary" onclick="showAddUser()">+ Thêm nhân viên</button>
        </div>
        <div id="user-list-area"></div>
      </div>
    </div>

  </div>
</div>

<!-- ADD USER MODAL -->
<div class="modal-backdrop" id="add-user-modal">
  <div class="modal">
    <h3>Thêm nhân viên</h3>
    <div class="grid2" style="gap:10px">
      <div class="field"><label>Tên đăng nhập</label><input id="nu-user" placeholder="vd: nguyen.van.a"></div>
      <div class="field"><label>Mã PIN</label><input id="nu-pin" placeholder="1234" type="number"></div>
      <div class="field full"><label>Họ tên</label><input id="nu-hoten" placeholder="Nguyễn Văn A"></div>
      <div class="field"><label>Vai trò</label>
        <select id="nu-role"><option value="user">Nhân viên</option><option value="admin">Admin</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="doAddUser()">Thêm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG – Thay bằng URL Apps Script của bạn sau khi deploy
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyb1TrtGNw_vvzudLsmZeDlDfH3kz_6sRYhHX-0CeIH1VFWmhLPDIkCUZvZ4-D3wyYMVA/exec';

// ============================================================
let currentUser = null;
let contracts = [];
let furniture = [
  {name:'Máy lạnh phòng khách',qty:'01',status:'Mới'},
  {name:'Sofa',qty:'01 bộ',status:'Mới'},
  {name:'Bàn ăn + 6 ghế',qty:'01 bộ',status:'Mới'},
  {name:'Tủ bếp trên + dưới',qty:'01 bộ',status:'Mới'},
  {name:'Tủ lạnh',qty:'01',status:'Mới'},
  {name:'Lò vi sóng',qty:'01',status:'Mới'},
  {name:'Giường master + nệm',qty:'01 bộ',status:'Mới'},
  {name:'Tủ quần áo master',qty:'01 bộ',status:'Mới'},
  {name:'Máy lạnh master',qty:'01',status:'Mới'},
  {name:'Giường phòng ngủ 1 + nệm',qty:'01 bộ',status:'Mới'},
  {name:'Tủ quần áo phòng ngủ 1',qty:'01 bộ',status:'Mới'},
  {name:'Máy lạnh phòng ngủ 1',qty:'01',status:'Mới'},
  {name:'Máy giặt',qty:'01',status:'Mới'},
  {name:'Chìa khóa cửa chính',qty:'01',status:'Mới'},
  {name:'Thẻ từ cư dân',qty:'03',status:'Mới'},
];

// ---- API ----
async function api(params) {
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url.toString());
  return r.json();
}

// ---- AUTH ----
async function doLogin() {
  const u = document.getElementById('inp-user').value.trim();
  const p = document.getElementById('inp-pin').value.trim();
  if (!u||!p) return;
  showLoading('Đang đăng nhập...');
  try {
    const res = await api({action:'login', username:u, pin:p});
    if (res.ok) {
      currentUser = {username:u, pin:p, role:res.role, hoten:res.hoten};
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-name').textContent = res.hoten || u;
      document.getElementById('user-avatar').textContent = (res.hoten||u).slice(0,2).toUpperCase();
      if (res.role === 'admin') {
        document.getElementById('admin-tab').style.display = 'inline-block';
        document.getElementById('user-role-tag').style.display = 'inline-block';
      }
      await loadContracts();
    } else {
      document.getElementById('login-err').textContent = res.error || 'Sai thông tin';
    }
  } catch(e) {
    document.getElementById('login-err').textContent = 'Lỗi kết nối. Kiểm tra lại cấu hình API.';
  }
  hideLoading();
}

document.getElementById('inp-pin').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  contracts = [];

function showTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

async function loadContracts() {
  showLoading('Đang tải dữ liệu...');
  try {
    const res = await api({action:'getContracts', username:currentUser.username, pin:currentUser.pin});
    if (res.ok) {
      contracts = res.data || [];
      renderList();
      renderStats();

  hideLoading();
}

function renderStats() {
  const total = contracts.length;
  const active = contracts.filter(c=>c.status==='active').length;
  const revenue = contracts.filter(c=>c.status==='active').reduce((s,c)=>s+(parseInt(c.gia_thue)||0),0);

// ---- FORM ----
function tinhToan() {
  const months = parseInt(document.getElementById('f-sothang').value)||12;
  const startStr = document.getElementById('f-batdau').value;
  const rent = parseInt(document.getElementById('f-giathue').value)||0;
  if (startStr) {
    const end = new Date(startStr);
    end.setMonth(end.getMonth()+months);
    end.setDate(end.getDate()-1);
    document.getElementById('f-ketthuc').value = end.toISOString().split('T')[0];
    if (!document.getElementById('f-coc2ngay').value)
      document.getElementById('f-coc2ngay').value = startStr;
  }
  if (rent > 0) {
    document.getElementById('f-coc').value = (rent*2).toLocaleString('vi-VN') + ' VNĐ';
    document.getElementById('f-thulaomg').value = rent.toLocaleString('vi-VN') + ' VNĐ';
  }
}

// ---- DOCX GENERATION ----
function numToWords(n) {
  const units=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
  const tens=['','mười','hai mươi','ba mươi','bốn mươi','năm mươi','sáu mươi','bảy mươi','tám mươi','chín mươi'];
  if(n===0) return 'không';
  if(n<10) return units[n];
  if(n<100) return tens[Math.floor(n/10)]+(n%10?' '+units[n%10]:'');
  if(n<1000) return units[Math.floor(n/100)]+' trăm'+(n%100?' '+numToWords(n%100):'');
  if(n<1e6) return numToWords(Math.floor(n/1000))+' nghìn'+(n%1000?' '+numToWords(n%1000):'');
  if(n<1e9) return numToWords(Math.floor(n/1e6))+' triệu'+(n%1e6?' '+numToWords(n%1e6):'');
  return n.toString();
}

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }

function formatDate(str) {
  if(!str) return '...';
  const [y,m,d] = str.split('-');
  return `${d}/${m}/${y}`;
}

// ---- ADMIN ----
async function loadUsers() {
  const res = await api({action:'getUsers', username:currentUser.username, pin:currentUser.pin});
  const el = document.getElementById('user-list-area');
  if (!res.ok) { el.innerHTML = '<p style="color:var(--danger)">'+res.error+'</p>'; return; }
  el.innerHTML = res.data.map(u=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border)">
      <div class="avatar" style="background:#f0e9d6;color:#a8893e">${(u.hoten||u.username).slice(0,2).toUpperCase()}</div>
      <div style="flex:1">
        <div style="font-weight:500">${u.hoten||u.username}</div>
        <div style="font-size:12px;color:var(--text2)">@${u.username} · ${u.created||''}</div>
      </div>
      <span class="badge ${u.role==='admin'?'badge-active':'badge-draft'}">${u.role==='admin'?'Admin':'Nhân viên'}</span>
    </div>
  `).join('');
}

function showAddUser() { document.getElementById('add-user-modal').classList.add('show'); }
function closeModal() { document.getElementById('add-user-modal').classList.remove('show'); }

async function doAddUser() {
  const newUser = document.getElementById('nu-user').value.trim();
  const newPin = document.getElementById('nu-pin').value.trim();
  const role = document.getElementById('nu-role').value;
  document.getElementById('nu-hoten').value; // just access
  if (!newUser||!newPin) { toast('Nhập đủ thông tin','error'); return; }
  showLoading('Đang thêm...');
  await api({action:'addUser', username:currentUser.username, pin:currentUser.pin, newUser, newPin, role});
  hideLoading();
  closeModal();
  toast('Đã thêm nhân viên','success');
  loadUsers();
}

// ---- UI HELPERS ----
function showLoading(msg='Đang xử lý...') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show'+(type?' '+type:'');
  setTimeout(()=>el.classList.remove('show'), 2800);
}
